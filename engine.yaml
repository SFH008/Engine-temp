
esphome:
  name: engine-temp
  friendly_name: Engine Temperature

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "engine-temp-fallback"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

one_wire:
  - platform: gpio
    pin: D5

sensor:
  - platform: dallas_temp
    address: 0x2e03219779899128
    name: "Alternator Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 10s
    on_value:
      then:
        - mqtt.publish:
            topic: signalk/propulsion/mainEngine/alternatorTemperature
            payload: !lambda 'return to_string(x);'

  - platform: dallas_temp
    address: 0xda0416a4bcd0ff28
    name: "Engine Room Temperature"
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 10s
    on_value:
      then:
        - mqtt.publish:
            topic: signalk/propulsion/mainEngine/engineRoomTemperature
            payload: !lambda 'return to_string(x);'