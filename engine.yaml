
esphome:
  name: engine-temp
  friendly_name: Engine Temperature

esp8266:
  board: d1_mini

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "engine-temp-fallback"

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

one_wire:
  - platform: gpio
    pin: D5

sensor:
  - platform: dallas_temp
    address: 0x0000000000000001
    name: "Coolant Temperature"
    id: coolant_temp
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 10s

  - platform: dallas_temp
    address: 0x0000000000000002
    name: "Exhaust Temperature"
    id: exhaust_temp
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 10s

  - platform: dallas_temp
    address: 0x0000000000000003
    name: "Gearbox Temperature"
    id: gearbox_temp
    unit_of_measurement: "°C"
    device_class: temperature
    accuracy_decimals: 1
    update_interval: 10s
EOF